t can be _safe_ reloaded.\r", "g": "reload", "gru": "Перезагрузка таблиц"}, {"n": "reload config", "s": 3, "ru": "Перезагрузить mangosd.conf.", "en": "Syntax: .reload config\r\\n\r\\nReload config settings (by default stored in mangosd.conf). Not all settings can be change at reload: some new setting values will be ignored until restart, some values will applied with delay or only to new objects/maps, some values will explicitly rejected to change at reload.\r", "g": "reload", "gru": "Перезагрузка таблиц"}, {"n": "repairitems", "s": 2, "ru": "Починить все предметы цели (бесплатно).", "en": "Syntax: .repairitems\r\\n\r\\nRepair all selected player's items.\r", "g": "repairitems", "gru": "Починка"}, {"n": "reset achievements", "s": 3, "ru": "Сбросить все достижения игрока.", "en": "Syntax: .reset achievements [$playername]\r\\n\r\\nReset achievements data for selected or named (online or offline) character. Achievements for persistance progress data like completed quests/etc re-filled at reset. Achievements for events like kills/casts/etc will lost.\r", "g": "reset", "gru": "Сброс"}, {"n": "reset all", "s": 3, "ru": "Сбросить spells И talents.", "en": "Syntax: .reset all spells\r\\n\r\\nSyntax: .reset all talents\r\\n\r\\nRequest reset spells or talents (including talents for all character's pets if any) at next login each existed character.\r", "g": "reset", "gru": "Сброс"}, {"n": "reset honor", "s": 3, "ru": "Обнулить honor-статистику.", "en": "Syntax: .reset honor [Playername]\r\\n  Reset all honor data for targeted character.\r", "g": "reset", "gru": "Сброс"}, {"n": "reset level", "s": 3, "ru": "Сбросить уровень персонажа (к 1).", "en": "Syntax: .reset level [Playername]\r\\n  Reset level to 1 including reset stats and talents.  Equipped items with greater level requirement can be lost.\r", "g": "reset", "gru": "Сброс"}, {"n": "reset specs", "s": 3, "ru": "Сбросить все спеки талантов (двойной спек).", "en": "Syntax: .reset specs [Playername]\r\\n  Removes all talents (for all specs) of the targeted player or named player. Playername can be name of offline character. With player talents also will be reset talents for all character's pets if any.\r", "g": "reset", "gru": "Сброс"}, {"n": "reset spells", "s": 3, "ru": "Сбросить все выученные спеллы.", "en": "Syntax: .reset spells [Playername]\r\\n  Removes all non-original spells from spellbook.\r\\n. Playername can be name of offline character.\r", "g": "reset", "gru": "Сброс"}, {"n": "reset stats", "s": 3, "ru": "Пересчитать статы (восстановление).", "en": "Syntax: .reset stats [Playername]\r\\n  Resets(recalculate) all stats of the targeted player to their original VALUESat current level.\r", "g": "reset", "gru": "Сброс"}, {"n": "reset talents", "s": 3, "ru": "Сбросить таланты (бесплатно).", "en": "Syntax: .reset talents [Playername]\r\\n  Removes all talents (current spec) of the targeted player or pet or named player. With player talents also will be reset talents for all character's pets if any.\r", "g": "reset", "gru": "Сброс"}, {"n": "respawn", "s": 3, "ru": "Респавн всех мёртвых мобов в зоне.", "en": "Syntax: .respawn\r\\n\r\\nRespawn selected creature or respawn all nearest creatures (if none selected) and GO without waiting respawn time expiration.\r", "g": "respawn", "gru": "Респавн"}, {"n": "revive", "s": 3, "ru": "Воскресить цель/игрока.", "en": "Syntax: .revive\r\\n\r\\nRevive the selected player. If no player is selected, it will revive you.\r", "g": "revive", "gru": "Воскресить"}, {"n": "save", "s": 0, "ru": "Сохранить персонажа в БД сейчас.", "en": "Syntax: .save\r\\n\r\\nSaves your character.\r", "g": "save", "gru": "Сохранить"}, {"n": "saveall", "s": 1, "ru": "Сохранить всех игроков онлайн.", "en": "Syntax: .saveall\r\\n\r\\nSave all characters in game.\r", "g": "saveall", "gru": "Сохранить всех"}, {"n": "send items", "s": 3, "ru": "Отправить игроку предметы почтой.", "en": "Syntax: .send items #playername \"#subject\" \"#text\" itemid1[:count1] itemid2[:count2] ... itemidN[:countN]\r\\n\r\\nSend a mail to a player. Subject and mail text must be in \"\". If for itemid not provided related count values then expected 1, if count > max items in stack then items will be send in required amount stacks. All stacks amount in mail limited to 12.\r", "g": "send", "gru": "Отправить"}, {"n": "send mail", "s": 1, "ru": "Отправить игроку письмо.", "en": "Syntax: .send mail #playername \"#subject\" \"#text\"\r\\n\r\\nSend a mail to a player. Subject and mail text must be in \"\".\r", "g": "send", "gru": "Отправить"}, {"n": "send mass items", "s": 3, "ru": "Массовая отправка предметов игрокам.", "en": "Syntax: .send mass items #racemask|$racename|alliance|horde|all \"#subject\" \"#text\" itemid1[:count1] itemid2[:count2] ... itemidN[:countN]\r\\n\r\\nSend a mail to players. Subject and mail text must be in \"\". If for itemid not provided related count values then expected 1, if count > max items in stack then items will be send in required amount stacks. All stacks amount in mail limited to 12.\r", "g": "send", "gru": "Отправить"}, {"n": "send mass mail", "s": 3, "ru": "Массовая отправка писем.", "en": "Syntax: .send mass mail #racemask|$racename|alliance|horde|all \"#subject\" \"#text\"\r\\n\r\\nSend a mail to players. Subject and mail text must be in \"\".\r", "g": "send", "gru": "Отправить"}, {"n": "send mass money", "s": 3, "ru": "Массовая отправка денег.", "en": "Syntax: .send mass money #racemask|$racename|alliance|horde|all \"#subject\" \"#text\" #money\r\\n\r\\nSend mail with money to players. Subject and mail text must be in \"\".\r", "g": "send", "gru": "Отправить"}, {"n": "send message", "s": 3, "ru": "Отправить системное сообщение игроку.", "en": "Syntax: .send message $playername $message\r\\n\r\\nSend screen message to player from ADMINISTRATOR.\r", "g": "send", "gru": "Отправить"}, {"n": "send money", "s": 3, "ru": "Отправить деньги по почте.", "en": "Syntax: .send money #playername \"#subject\" \"#text\" #money\r\\n\r\\nSend mail with money to a player. Subject and mail text must be in \"\".\r", "g": "send", "gru": "Отправить"}, {"n": "server corpses", "s": 2, "ru": "Принудительно обработать трупы.", "en": "Syntax: .server corpses\r\\n\r\\nTriggering corpses expire check in world.\r", "g": "server", "gru": "Сервер"}, {"n": "server exit", "s": 4, "ru": "Немедленный выход без отключения игроков.", "en": "Syntax: .server exit\r\\n\r\\nTerminate mangosd NOW. Exit code 0.\r", "g": "server", "gru": "Сервер"}, {"n": "server idlerestart", "s": 3, "ru": "Idle рестарт.", "en": "Syntax: .server idlerestart #delay\r\\n\r\\nRestart the server after #delay seconds if no active connections are present (no players). Use #exist_code or 2 as program exist code.\r", "g": "server", "gru": "Сервер"}, {"n": "server idlerestart cancel", "s": 3, "ru": "Отменить idle-рестарт.", "en": "Syntax: .server idlerestart cancel\r\\n\r\\nCancel the restart/shutdown timer if any.\r", "g": "server", "gru": "Сервер"}, {"n": "server idleshutdown", "s": 3, "ru": "Idle shutdown.", "en": "Syntax: .server idleshutdown #delay [#exist_code]\r\\n\r\\nShut the server down after #delay seconds if no active connections are present (no players). Use #exist_code or 0 as program exist code.\r", "g": "server", "gru": "Сервер"}, {"n": "server idleshutdown cancel", "s": 3, "ru": "Отменить idle-выключение.", "en": "Syntax: .server idleshutdown cancel\r\\n\r\\nCancel the restart/shutdown timer if any.\r", "g": "server", "gru": "Сервер"}, {"n": "server info", "s": 0, "ru": "Информация о сервере.", "en": "Syntax: .server info\r\\n\r\\nDisplay server version and the number of connected players.\r", "g": "server", "gru": "Сервер"}, {"n": "server log filter", "s": 4, "ru": "Настроить фильтр логов.", "en": "Syntax: .server log filter [($filtername|all) (on|off)]\r\\n\r\\nShow or set server log filters. If used \"all\" then all filters will be set to on/off state.\r", "g": "server", "gru": "Сервер"}, {"n": "server log level", "s": 4, "ru": "Настроить уровень логов.", "en": "Syntax: .server log level [#level]\r\\n\r\\nShow or set server log level (0 - errors only, 1 - basic, 2 - detail, 3 - debug).\r", "g": "server", "gru": "Сервер"}, {"n": "server motd", "s": 0, "ru": "Показать текущий MOTD.", "en": "Syntax: .server motd\r\\n\r\\nShow server Message of the day.\r", "g": "server", "gru": "Сервер"}, {"n": "server plimit", "s": 3, "ru": "Лимит игроков онлайн.", "en": "Syntax: .server plimit [#num|-1|-2|-3|reset|player|moderator|gamemaster|administrator]\r\\n\r\\nWithout arg show current player amount and security level limitations for login to server, with arg set player linit ($num > 0) or securiti limitation ($num < 0 or security leme name. With `reset` sets player limit to the one in the config file\r", "g": "server", "gru": "Сервер"}, {"n": "server restart", "s": 3, "ru": "Рестарт.", "en": "Syntax: .server restart #delay\r\\n\r\\nRestart the server after #delay seconds. Use #exist_code or 2 as program exist code.\r", "g": "server", "gru": "Сервер"}, {"n": "server restart cancel", "s": 3, "ru": "Отменить перезагрузку.", "en": "Syntax: .server restart cancel\r\\n\r\\nCancel the restart/shutdown timer if any.\r", "g": "server", "gru": "Сервер"}, {"n": "server set motd", "s": 3, "ru": "Установить MOTD.", "en": "Syntax: .server set motd $MOTD\r\\n\r\\nSet server Message of the day.\r", "g": "server", "gru": "Сервер"}, {"n": "server shutdown", "s": 3, "ru": "Shutdown.", "en": "Syntax: .server shutdown #delay [#exit_code]\r\\n\r\\nShut the server down after #delay seconds. Use #exit_code or 0 as program exit code.\r", "g": "server", "gru": "Сервер"}, {"n": "server shutdown cancel", "s": 3, "ru": "Отменить выключение.", "en": "Syntax: .server shutdown cancel\r\\n\r\\nCancel the restart/shutdown timer if any.\r", "g": "server", "gru": "Сервер"}, {"n": "setskill", "s": 3, "ru": "Установить значение скилла цели.", "en": "Syntax: .setskill #skill #level [#max]\r\\n\r\\nSet a skill of id #skill with a current skill value of #level and a maximum value of #max (or equal current maximum if not provide) for the selected character. If no character is selected, you learn the skill.\r", "g": "setskill", "gru": "Установка скилла"}, {"n": "showarea", "s": 3, "ru": "Открыть зону на карте (как explored).", "en": "Syntax: .showarea #areaid\r\\n\r\\nReveal the area of #areaid to the selected character. If no character is selected, reveal this area to you.\r", "g": "showarea", "gru": "Открыть зону"}, {"n": "stable", "s": 3, "ru": "Открыть конюшню (список петов хантера).", "en": "Syntax: .stable\r\\n\r\\nShow your pet stable.\r", "g": "stable", "gru": "Конюшня"}, {"n": "start", "s": 0, "ru": "Возврат в стартовую локацию для твоей расы.", "en": "Syntax: .start\r\\n\r\\nTeleport you to the starting area of your character.\r", "g": "start", "gru": "Старт"}, {"n": "taxicheat", "s": 1, "ru": "Открыть ВСЕ такси-ноды (или закрыть).", "en": "Syntax: .taxicheat on/off\r\\n\r\\nTemporary grant access or remove to all taxi routes for the selected character. If no character is selected, hide or reveal all routes to you.\r\\n\r\\nVisited taxi nodes sill accessible after removing access.\r", "g": "taxicheat", "gru": "Таксизёр все точки"}, {"n": "tele", "s": 1, "ru": "Команды телепорта.", "en": "Syntax: .tele #location\r\\n\r\\nTeleport player to a given location.\r", "g": "tele", "gru": "Телепорт"}, {"n": "tele add", "s": 3, "ru": "Сохранить текущую позицию как .tele точку.", "en": "Syntax: .tele add $name\r\\n\r\\nAdd current your position to .tele command target locations list with name $name.\r", "g": "tele", "gru": "Телепорт"}, {"n": "tele del", "s": 3, "ru": "Удалить .tele точку.", "en": "Syntax: .tele del $name\r\\n\r\\nRemove location with name $name for .tele command locations list.\r", "g": "tele", "gru": "Телепорт"}, {"n": "tele group", "s": 1, "ru": "Телепортнуть группу в точку.", "en": "Syntax: .tele group#location\r\\n\r\\nTeleport a selected player and his group members to a given location.\r", "g": "tele", "gru": "Телепорт"}, {"n": "tele name", "s": 1, "ru": "Телепортнуть игрока по имени в точку.", "en": "Syntax: .tele name [#playername] #location\r\\n\r\\nTeleport the given character to a given location. Character can be offline.\r", "g": "tele", "gru": "Телепорт"}, {"n": "ticket", "s": 2, "ru": "Тикеты.", "en": "Syntax: .ticket #id\r\\n\r\\nActs as an alias of: \".ticket read\"\r\\n\r", "g": "ticket", "gru": "Тикет"}, {"n": "ticket discard", "s": 2, "ru": "Отбросить тикет.", "en": "Syntax: .ticket discard #id [$conclusion]\r\\n\r\\nClose GM ticket with number #id as discarded. If $conclusion is provided, it will be visible to the author as well.\r", "g": "ticket", "gru": "Тикет"}, {"n": "ticket escalate", "s": 2, "ru": "Эскалировать тикет.", "en": "Syntax: .ticket escalate #id\r\\n\r\\nAttempt to escalate GM ticket with number #id. Current assignee will be unassigned on success.\r", "g": "ticket", "gru": "Тикет"}, {"n": "ticket go", "s": 2, "ru": "Телепорт к месту где был создан тикет.", "en": "Syntax: .ticket go #id\r\\n\r\\nAttempt to teleport to the location where GM ticket with number #id was originally created.\r", "g": "ticket", "gru": "Тикет"}, {"n": "ticket goname", "s": 2, "ru": "Телепорт к игроку создавшему тикет.", "en": "Syntax: .ticket goname #id\r\\n\r\\nAttempt to teleport to the author of the GM ticket with number #id.\r", "g": "ticket", "gru": "Тикет"}, {"n": "ticket note", "s": 2, "ru": "Добавить заметку к тикету.", "en": "Syntax: .ticket note #id $message\r\\n\r\\nAdd a note visible only to GMs to the GM ticket with number #id.\r", "g": "ticket", "gru": "Тикет"}, {"n": "ticket read", "s": 2, "ru": "Прочитать содержимое тикета.", "en": "Syntax: .ticket read #id\r\\n\r\\nShow contents of GM ticket with number #id.\r", "g": "ticket", "gru": "Тикет"}, {"n": "ticket resolve", "s": 2, "ru": "Закрыть тикет как resolved.", "en": "Syntax: .ticket resolve #id [$conclusion]\r\\n\r\\nClose GM ticket with number #id as resolved. If $conclusion is provided, it will be visible to player as well.\r", "g": "ticket", "gru": "Тикет"}, {"n": "ticket sort", "s": 2, "ru": "Отсортировать тикеты.", "en": "Syntax: .ticket sort #id #categoryid\r\\n\r\\nAttempt to assign the GM ticket with number #id with a category by id #categoryid.\r", "g": "ticket", "gru": "Тикет"}, {"n": "ticket whisper", "s": 2, "ru": "Написать приват автору тикета.", "en": "Syntax: .ticket whisper #id $message\r\\n\r\\nAttempt to answer in-game GM ticket with number #id by sending whisper with $message. Ticket will be assigned regardless of author's online status.\r", "g": "ticket", "gru": "Тикет"}, {"n": "tickets", "s": 2, "ru": "Списки тикетов.", "en": "Syntax: .tickets [on|off|[#categoryid #max|#max] [online]]\r\\n\r\\nIf \"on\"/\"off\" provided, enable or disable in-game GM ticket queue notifications and GM ticket alerts. Acts as an alias of \".tickets list\" otherwise.\r\\n\r", "g": "tickets", "gru": "Тикеты"}, {"n": "tickets list", "s": 2, "ru": "Список открытых tickets.", "en": "Syntax: .tickets list [#categoryid #max|#max] [online]\r\\n\r\\nShow current GM tickets queue. If #categoryid is provided, show only GM tickets from that category.\r", "g": "tickets", "gru": "Тикеты"}, {"n": "tickets queue", "s": 3, "ru": "Очередь новых тикетов.", "en": "Syntax: .tickets queue on|off\r\\n\r\\nEnable or disable GM tickets queue until next restart or administrator's command.\r", "g": "tickets", "gru": "Тикеты"}, {"n": "titles add", "s": 2, "ru": "Добавить титул цели.", "en": "Syntax: .titles add #title\r\\nAdd title #title (id or shift-link) to known titles list for selected player.\r", "g": "titles", "gru": "Титулы"}, {"n": "titles current", "s": 2, "ru": "Установить текущий отображаемый титул.", "en": "Syntax: .titles current #title\r\\nSet title #title (id or shift-link) as current selected titl for selected player. If title not in known title list for player then it will be added to list.\r", "g": "titles", "gru": "Титулы"}, {"n": "titles remove", "s": 2, "ru": "Убрать титул.", "en": "Syntax: .titles remove #title\r\\nRemove title #title (id or shift-link) from known titles list for selected player.\r", "g": "titles", "gru": "Титулы"}, {"n": "titles setmask", "s": 2, "ru": "Установить всю маску титулов.", "en": "Syntax: .titles setmask #mask\r\\n\r\\nAllows user to use all titles from #mask.\r\\n\r\\n #mask=0 disables the title-choose-field\r", "g": "titles", "gru": "Титулы"}, {"n": "trigger", "s": 2, "ru": "Area triggers.", "en": "Syntax: .trigger [#trigger_id|$trigger_shift-link|$trigger_target_shift-link]\r\\n\r\\nShow detail infor about areatrigger with id #trigger_id or trigger id associated with shift-link. If areatrigger id or shift-link not provided then selected nearest areatrigger at current map.\r", "g": "trigger", "gru": "Триггеры зон"}, {"n": "trigger active", "s": 2, "ru": "Активные area triggers зоны.", "en": "Syntax: .trigger active\r\\n\r\\nShow list of areatriggers with activation zone including current character position.\r", "g": "trigger", "gru": "Триггеры зон"}, {"n": "trigger near", "s": 2, "ru": "Ближайшие area triggers.", "en": "Syntax: .trigger near [#distance]\r\\n\r\\nOutput areatriggers at distance #distance from player. If #distance not provided use 10 as default value.\r", "g": "trigger", "gru": "Триггеры зон"}, {"n": "unaura", "s": 3, "ru": "Снять ауру с цели.", "en": "Syntax: .unaura #spellid\r\\n\r\\nRemove aura due to spell #spellid from the selected Unit.\r", "g": "unaura", "gru": "Снять ауру"}, {"n": "unban account", "s": 3, "ru": "Снять бан с аккаунта.", "en": "Syntax: .unban account $Name\r\\nUnban accounts for account name pattern.\r", "g": "unban", "gru": "Снять бан"}, {"n": "unban character", "s": 3, "ru": "Снять бан с персонажа.", "en": "Syntax: .unban character $Name\r\\nUnban accounts for character name pattern.\r", "g": "unban", "gru": "Снять бан"}, {"n": "unban ip", "s": 3, "ru": "Снять бан с IP.", "en": "Syntax : .unban ip $Ip\r\\nUnban accounts for IP pattern.\r", "g": "unban", "gru": "Снять бан"}, {"n": "unlearn", "s": 3, "ru": "Забыть заклинание (цель — игрок или селф).", "en": "Syntax: .unlearn #spell [all]\r\\n\r\\nUnlearn for selected player a spell #spell.  If 'all' provided then all ranks unlearned.\r", "g": "unlearn", "gru": "Забыть заклинание"}, {"n": "unmute", "s": 1, "ru": "Снять мут с игрока.", "en": "Syntax: .unmute [$playerName]\r\\n\r\\nRestore chat messaging for any character from account of character $playerName (or selected). Character can be ofline.\r", "g": "unmute", "gru": "Снять мут"}, {"n": "waterwalk", "s": 2, "ru": "Вкл/выкл хождение по воде.", "en": "Syntax: .waterwalk on/off\r\\n\r\\nSet on/off waterwalk state for selected player.\r", "g": "waterwalk", "gru": "Хождение по воде"}, {"n": "wchange", "s": 3, "ru": "Изменить погоду в зоне.", "en": "Syntax: .wchange #weathertype #status\r\\n\r\\nSet current weather to #weathertype with an intensity of #status.\r\\n\r\\n#weathertype can be 1 for rain, 2 for snow, and 3 for sand. #status can be 0 for disabled, and 1 for enabled.\r", "g": "wchange", "gru": "Погода"}, {"n": "whispers", "s": 1, "ru": "Показать/скрыть шёпоты GM'у.", "en": "Syntax: .whispers on|off\r\\nEnable/disable accepting whispers by GM from players. By default use mangosd.conf setting.\r", "g": "whispers", "gru": "Приват-сообщения"}, {"n": "wp add", "s": 2, "ru": "Добавить waypoint к пути моба.", "en": "Syntax: .wp add [Selected Creature or dbGuid] [pathId [wpOrigin] ]\r", "g": "wp", "gru": "Waypoints"}, {"n": "wp export", "s": 3, "ru": "Экспортировать waypoints пути в SQL.", "en": "Syntax: .wp export [#creature_guid or Select a Creature] $filename\r", "g": "wp", "gru": "Waypoints"}, {"n": "wp modify", "s": 2, "ru": "Изменить параметры waypoint'а.", "en": "Syntax: .wp modify command [dbGuid, id] [value]\r\\nwhere command must be one of: waittime  | scriptid | orientation | del | move\r\\nIf no waypoint was selected, one can be chosen with dbGuid and id.\r\\nThe commands have the following meaning:\r\\n waittime (Set the time the npc will wait at a point (in ms))\r\\n scriptid (Set the DB-Script that will be executed when the wp is reached)\r\\n orientation (Set the orientation of this point) \r\\n del (Remove the waypoint from the path)\r\\n move (Move the wayoint to the current position of the player)\r", "g": "wp", "gru": "Waypoints"}, {"n": "wp show", "s": 2, "ru": "Показать waypoint-визуализацию пути.", "en": "Syntax: .wp show command [dbGuid] [pathId [wpOrigin] ]\r\\nwhere command can have one of the following values\r\\non (to show all related wp)\r\\nfirst (to see only first one)\r\\nlast (to see only last one)\r\\noff (to hide all related wp)\r\\ninfo (to get more info about theses wp)\r\\n\r\\nFor using info you have to do first show on and than select a Visual-Waypoint and do the show info!\r\\nwith pathId and wpOrigin you can specify which path to show (optional)", "g": "wp", "gru": "Waypoints"}];
const SEC_LABEL = {"0": "Игрок", "1": "Модер", "2": "ГМ", "3": "Админ", "4": "Рут"};
const SEC_COLOR = {"0": "#64748b", "1": "#3b82f6", "2": "#10b981", "3": "#f59e0b", "4": "#ef4444"};

const groups = {};
DATA.forEach(c => {
    (groups[c.g] = groups[c.g] || { ru: c.gru, items: [] }).items.push(c);
});

const main = document.getElementById('main');
const searchInput = document.getElementById('search');
const filters = document.getElementById('filters');
const visibleCount = document.getElementById('visible-count');

function copyToClipboard(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
        const orig = btn.textContent;
        btn.textContent = '✓ скопировано';
        btn.classList.add('copied');
        setTimeout(() => {
            btn.textContent = orig;
            btn.classList.remove('copied');
        }, 1500);
    });
}

function render() {
    main.innerHTML = '';
    Object.keys(groups).sort().forEach(top => {
        const g = groups[top];
        const groupEl = document.createElement('div');
        groupEl.className = 'group';

        const hdr = document.createElement('div');
        hdr.className = 'group-header';
        hdr.innerHTML =
            '<span class="group-arrow">▶</span>' +
            '<span class="group-ru">' + g.ru + '</span>' +
            '<span class="group-en">.' + top + '</span>' +
            '<span class="group-count" data-count>' + g.items.length + '</span>';
        hdr.addEventListener('click', () => groupEl.classList.toggle('open'));
        groupEl.appendChild(hdr);

        const body = document.createElement('div');
        body.className = 'group-body';
        g.items.forEach(c => {
            const cmd = document.createElement('div');
            cmd.className = 'cmd';
            cmd.dataset.name = c.n;
            cmd.dataset.sec = c.s;
            cmd.dataset.search = (c.n + ' ' + (c.ru || '') + ' ' + c.en).toLowerCase();

            const header = document.createElement('div');
            header.className = 'cmd-header';

            const nameEl = document.createElement('span');
            nameEl.className = 'cmd-name';
            nameEl.textContent = '.' + c.n;
            header.appendChild(nameEl);

            const secEl = document.createElement('span');
            secEl.className = 'sec-badge';
            secEl.textContent = c.s + ' ' + SEC_LABEL[c.s];
            secEl.style.background = SEC_COLOR[c.s];
            header.appendChild(secEl);

            if (!c.ru) {
                const untr = document.createElement('span');
                untr.className = 'untranslated';
                untr.textContent = 'EN';
                untr.title = 'Нет русского перевода — смотри оригинал ниже';
                header.appendChild(untr);
            }

            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.textContent = 'скопировать';
            copyBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                copyToClipboard('.' + c.n, copyBtn);
            });
            header.appendChild(copyBtn);
            cmd.appendChild(header);

            if (c.ru) {
                const helpRu = document.createElement('div');
                helpRu.className = 'cmd-help-ru';
                helpRu.textContent = c.ru;
                cmd.appendChild(helpRu);
            }

            if (c.en && c.en.trim()) {
                const toggleBtn = document.createElement('button');
                toggleBtn.className = 'show-en';
                toggleBtn.textContent = c.ru ? '▼ оригинал (EN)' : '▼ описание (EN)';
                const helpEn = document.createElement('div');
                helpEn.className = 'cmd-help-en';
                helpEn.textContent = c.en;
                helpEn.style.display = 'none';
                toggleBtn.addEventListener('click', () => {
                    const open = helpEn.style.display === 'none';
                    helpEn.style.display = open ? 'block' : 'none';
                    toggleBtn.textContent = (open ? '▲' : '▼') + ' ' + (c.ru ? 'оригинал (EN)' : 'описание (EN)');
                });
                // Если нет RU — сразу показываем EN
                if (!c.ru) {
                    helpEn.style.display = 'block';
                    toggleBtn.textContent = '▲ описание (EN)';
                }
                cmd.appendChild(toggleBtn);
                cmd.appendChild(helpEn);
            }

            body.appendChild(cmd);
        });
        groupEl.appendChild(body);
        main.appendChild(groupEl);
    });
}

function applyFilter() {
    const q = searchInput.value.trim().toLowerCase();
    const activeBtn = filters.querySelector('.filter-btn.active');
    const secFilter = activeBtn.dataset.sec;
    let visible = 0;
    document.querySelectorAll('.group').forEach(g => {
        let groupVisible = 0;
        g.querySelectorAll('.cmd').forEach(cmd => {
            const matchQ = !q || cmd.dataset.search.includes(q);
            const matchSec = secFilter === 'all' || cmd.dataset.sec === secFilter;
            const show = matchQ && matchSec;
            cmd.classList.toggle('hidden', !show);
            if (show) { groupVisible++; visible++; }
        });
        g.classList.toggle('hidden', groupVisible === 0);
        const count = g.querySelector('[data-count]');
        if (count) count.textContent = groupVisible;
        if (q && groupVisible > 0) g.classList.add('open');
        else if (!q) g.classList.remove('open');
    });
    visibleCount.textContent = visible;
}

searchInput.addEventListener('input', applyFilter);
filters.addEventListener('click', e => {
    if (!e.target.classList.contains('filter-btn')) return;
    filters.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    applyFilter();
});

document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== searchInput) {
        e.preventDefault();
        searchInput.focus();
    } else if (e.key === 'Escape') {
        searchInput.value = '';
        applyFilter();
        searchInput.blur();
    }
});

render();
applyFilter();
</script>
</body>
</html>
