name: Build & Deploy Patch

on:
  push:
    branches: [master]
    paths:
      - 'WowBot.Core/**'
      - 'WowBot.Injector/**'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish WowBot
        run: dotnet publish WowBot.Injector -c Release -r win-x86 --self-contained -o publish

      - name: Create version
        id: version
        shell: bash
        run: |
          if [ -f publish/version.txt ]; then OLD_VER=$(cat publish/version.txt); else OLD_VER="1.0"; fi
          MAJOR=$(echo $OLD_VER | cut -d. -f1)
          MINOR=$(echo $OLD_VER | cut -d. -f2)
          NEW_VER="$MAJOR.$((MINOR + 1))"
          echo "$NEW_VER" > publish/version.txt
          echo "version=$NEW_VER" >> $GITHUB_OUTPUT

      - name: Create patch.zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path _patch, _patch/Icons
          Copy-Item publish/WowBot.Core.dll _patch/
          Copy-Item publish/WowBot.Injector.dll _patch/
          Copy-Item publish/version.txt _patch/
          if (Test-Path publish/Icons/*.jpg) { Copy-Item publish/Icons/*.jpg _patch/Icons/ }
          Compress-Archive -Path _patch/* -DestinationPath patch.zip -Force

      - name: Deploy patch to VPS
        shell: bash
        env:
          VPS_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          # Записываем ключ
          mkdir -p ~/.ssh
          echo "$VPS_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H 45.131.187.128 >> ~/.ssh/known_hosts 2>/dev/null
          # Бэкап старого патча + копируем новый
          ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=no root@45.131.187.128 \
            "cd /var/www/wowbot && [ -f patch.zip ] && mv patch.zip previous_patch.zip || true"
          scp -i ~/.ssh/vps_key -o StrictHostKeyChecking=no patch.zip root@45.131.187.128:/var/www/wowbot/
          ssh -i ~/.ssh/vps_key -o StrictHostKeyChecking=no root@45.131.187.128 \
            "echo '${{ steps.version.outputs.version }}' > /var/www/wowbot/version.txt"
          echo "Deployed v${{ steps.version.outputs.version }}"
