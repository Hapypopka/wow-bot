name: Build & Deploy Patch

on:
  push:
    branches: [master]
    paths:
      - 'WowBot.Core/**'
      - 'WowBot.Injector/**'
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish WowBot
        run: dotnet publish WowBot.Injector -c Release -r win-x86 --self-contained -o publish

      - name: Create version
        id: version
        shell: bash
        run: |
          if [ -f publish/version.txt ]; then OLD_VER=$(cat publish/version.txt); else OLD_VER="1.0"; fi
          MAJOR=$(echo $OLD_VER | cut -d. -f1)
          MINOR=$(echo $OLD_VER | cut -d. -f2)
          NEW_VER="$MAJOR.$((MINOR + 1))"
          echo "$NEW_VER" > publish/version.txt
          echo "version=$NEW_VER" >> $GITHUB_OUTPUT

      - name: Create patch.zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path _patch, _patch/Icons
          Copy-Item publish/WowBot.Core.dll _patch/
          Copy-Item publish/WowBot.Injector.dll _patch/
          Copy-Item publish/version.txt _patch/
          if (Test-Path publish/Icons/*.jpg) { Copy-Item publish/Icons/*.jpg _patch/Icons/ }
          Compress-Archive -Path _patch/* -DestinationPath patch.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: patch
          path: patch.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: patch

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: v${{ needs.build.outputs.version }}
          files: patch.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # VPS скачивает patch.zip из Release автоматически через TG бота
