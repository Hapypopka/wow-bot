name: Build & Deploy Patch

on:
  push:
    branches: [master]
    paths:
      - 'WowBot.Core/**'
      - 'WowBot.Injector/**'
      - '.github/workflows/**'
  workflow_dispatch:   # ручной запуск — собирает ещё и полный архив full.zip

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish WowBot
        run: dotnet publish WowBot.Injector -c Release -r win-x86 --self-contained -o publish

      - name: Create version
        id: version
        shell: bash
        run: |
          # Берём последний тег из GitHub, инкрементим
          LATEST=$(git tag --sort=-v:refname | head -1 | tr -d 'v')
          if [ -z "$LATEST" ]; then LATEST="1.0"; fi
          MAJOR=$(echo $LATEST | cut -d. -f1)
          MINOR=$(echo $LATEST | cut -d. -f2)
          NEW_VER="$MAJOR.$((MINOR + 1))"
          echo "$NEW_VER" > publish/version.txt
          echo "version=$NEW_VER" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VER (was $LATEST)"

      - name: Create patch.zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path _patch, _patch/Icons
          Copy-Item publish/WowBot.Core.dll _patch/
          Copy-Item publish/WowBot.Injector.dll _patch/
          Copy-Item publish/version.txt _patch/
          if (Test-Path publish/Icons/*.jpg) { Copy-Item publish/Icons/*.jpg _patch/Icons/ }
          if (Test-Path publish/app.ico) { Copy-Item publish/app.ico _patch/ }
          Compress-Archive -Path _patch/* -DestinationPath patch.zip -Force

      - name: Upload patch artifact
        uses: actions/upload-artifact@v4
        with:
          name: patch
          path: patch.zip

      # Полный архив (вся папка publish) — только при ручном запуске.
      # Нужен чтобы дать бота с нуля новому человеку; обычные пуши его не собирают.
      - name: Create full.zip
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath full.zip -Force

      - name: Upload full artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: full
          path: full.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download patch artifact
        uses: actions/download-artifact@v4
        with:
          name: patch

      - name: Download full artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@v4
        with:
          name: full

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: v${{ needs.build.outputs.version }}
          files: |
            patch.zip
            full.zip
          fail_on_unmatched_files: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # VPS скачивает patch.zip из Release автоматически через TG бота
      # full.zip появляется в Release только при ручном запуске workflow
