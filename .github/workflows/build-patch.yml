name: Build & Deploy Patch

on:
  push:
    branches: [master]
    paths:
      - 'WowBot.Core/**'
      - 'WowBot.Injector/**'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish WowBot
        run: dotnet publish WowBot.Injector -c Release -r win-x86 --self-contained -o publish

      - name: Read version
        id: version
        shell: bash
        run: |
          # Increment version
          if [ -f publish/version.txt ]; then
            OLD_VER=$(cat publish/version.txt)
          else
            OLD_VER="1.0"
          fi
          # Extract major.minor, increment minor
          MAJOR=$(echo $OLD_VER | cut -d. -f1)
          MINOR=$(echo $OLD_VER | cut -d. -f2)
          NEW_MINOR=$((MINOR + 1))
          NEW_VER="$MAJOR.$NEW_MINOR"
          echo "$NEW_VER" > publish/version.txt
          echo "version=$NEW_VER" >> $GITHUB_OUTPUT

      - name: Create patch.zip
        shell: bash
        run: |
          mkdir -p _patch
          cp publish/WowBot.Core.dll _patch/
          cp publish/WowBot.Injector.dll _patch/
          cp publish/version.txt _patch/
          if [ -d "publish/Icons" ]; then
            mkdir -p _patch/Icons
            cp publish/Icons/*.jpg _patch/Icons/ 2>/dev/null || true
          fi
          cd _patch && zip -r ../patch.zip . && cd ..

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 45.131.187.128
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "patch.zip"
          target: "/var/www/wowbot/"

      - name: Update version on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 45.131.187.128
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/wowbot
            # Backup previous
            [ -f patch.zip.bak ] && rm patch.zip.bak
            [ -f previous_patch.zip ] && mv previous_patch.zip patch.zip.bak
            [ -f patch.zip.old ] && mv patch.zip.old previous_patch.zip
            # Move new
            mv patch.zip patch.zip.new || true
            [ -f patch.zip ] && mv patch.zip patch.zip.old
            mv patch.zip.new patch.zip || true
            echo "${{ steps.version.outputs.version }}" > version.txt

      - name: Notify via Telegram
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TG_CHAT_IDS }}
          token: 8188885083:AAHdEfFSf6snAJUoC4nbz1oFf8HzwLq4Y6U
          message: |
            🔔 WowBot обновление v${{ steps.version.outputs.version }}!
            Запусти update.exe
        continue-on-error: true
